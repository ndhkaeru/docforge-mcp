name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify release commit
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout public MCP repo
        uses: actions/checkout@v4

      - name: Checkout source overlay
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source-overlay

      - name: Apply source overlay
        shell: pwsh
        run: Copy-Item -Recurse -Force source-overlay\servers\* servers\

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create venv
        shell: pwsh
        run: |
          python -m venv .venv-build
          .\.venv-build\Scripts\python.exe -m pip install -U pip

      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv-build\Scripts\python.exe -m pip install `
            pytest `
            "mcp[cli]" `
            openpyxl `
            pillow `
            pdfminer.six `
            pdfplumber `
            mammoth `
            python-pptx `
            markdownify `
            beautifulsoup4 `
            lxml `
            defusedxml `
            charset-normalizer

      - name: Run tests
        shell: pwsh
        run: .\.venv-build\Scripts\python.exe -m pytest -q

  build:
    name: Build Windows executables
    runs-on: windows-latest
    needs: verify
    timeout-minutes: 60

    steps:
      - name: Checkout public MCP repo
        uses: actions/checkout@v4

      - name: Checkout source overlay
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source-overlay

      - name: Apply source overlay
        shell: pwsh
        run: Copy-Item -Recurse -Force source-overlay\servers\* servers\

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create venv and install build dependencies
        shell: pwsh
        run: |
          python -m venv .venv-build
          .\.venv-build\Scripts\python.exe -m pip install -U pip
          .\.venv-build\Scripts\python.exe -m pip install `
            pyinstaller `
            pytest `
            "mcp[cli]" `
            openpyxl `
            pillow `
            pdfminer.six `
            pdfplumber `
            mammoth `
            python-pptx `
            markdownify `
            beautifulsoup4 `
            lxml `
            defusedxml `
            charset-normalizer

      - name: Build all servers
        shell: pwsh
        run: |
          . .\.venv-build\Scripts\Activate.ps1
          $servers = @(
            @{ name = "excel-tools"; entry = "servers\excel\main.py"; paths = "servers\excel"; excludes = @("numpy", "lxml") },
            @{ name = "pdf-tools";   entry = "servers\pdf\main.py";   paths = "servers\pdf" },
            @{ name = "docx-tools";  entry = "servers\docx\main.py";  paths = "servers\docx" },
            @{ name = "pptx-tools";  entry = "servers\pptx\main.py";  paths = "servers\pptx" },
            @{ name = "csv-tools";   entry = "servers\csv\main.py";   paths = "servers\csv" },
            @{ name = "html-tools";  entry = "servers\html\main.py";  paths = "servers\html" },
            @{ name = "md-tools";    entry = "servers\md\main.py";    paths = "servers\md" },
            @{ name = "text-tools";  entry = "servers\text\main.py";  paths = "servers\text" },
            @{ name = "json-tools";  entry = "servers\json\main.py";  paths = "servers\json" }
          )
          foreach ($server in $servers) {
            $args = @("-m", "PyInstaller", "--clean", "--onefile", "--name", $server.name, "--paths", $server.paths, "--specpath", "build")
            if ($server.ContainsKey("excludes")) {
              foreach ($exclude in $server.excludes) { $args += @("--exclude-module", $exclude) }
            }
            $args += $server.entry
            python @args
          }

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Get-ChildItem dist -Filter *.exe | ForEach-Object {
            $name = $_.BaseName
            Copy-Item $_.FullName "artifacts\docforge-mcp-$name-windows-x64.exe"
          }
          Get-ChildItem artifacts -Filter *.exe | Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content "artifacts\docforge-mcp-${{ github.ref_name }}-sha256sums.txt"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docforge-mcp-windows-x64
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout full history for changelog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -50)
          fi
          {
            echo "notes<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ---

            ## Artifacts

            Windows x64 executables are attached for each MCP server.

            - `docforge-mcp-md-tools-windows-x64.exe`
            - `docforge-mcp-excel-tools-windows-x64.exe`
            - `docforge-mcp-pdf-tools-windows-x64.exe`
            - `docforge-mcp-docx-tools-windows-x64.exe`
            - `docforge-mcp-pptx-tools-windows-x64.exe`
            - `docforge-mcp-csv-tools-windows-x64.exe`
            - `docforge-mcp-html-tools-windows-x64.exe`
            - `docforge-mcp-text-tools-windows-x64.exe`
            - `docforge-mcp-json-tools-windows-x64.exe`

            Checksums are included in `docforge-mcp-${{ github.ref_name }}-sha256sums.txt`.
          files: artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
